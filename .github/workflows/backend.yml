name: Backend CI

# P2-14: Tests + lint for the FastAPI backend.
# Runs on PRs and main pushes whenever backend/ or this workflow changes.
#
# Core testing-rigor requirement (see
# ~/.claude/projects/-Users-brockhoward-ai-health-coach/memory/feedback_testing_rigor.md)
# enforced here:
#   1. Full pytest suite (unit + integration + regression + ML-specific).
#   2. ML boundary gate  — rest of backend/app/ may only import backend.ml.api.
#   3. Cold-boot gate    — no heavy ML dep may load on `from app.main import app`.
#   4. Alembic round-trip smoke — upgrade, downgrade, upgrade on a fresh DB.
#   5. App import smoke  — catches syntax / forward-ref bugs without booting FastAPI.
#
# Python version is pinned to 3.12 to match local dev (Stack.md). Do NOT bump
# without testing every ML dep on the new Python. Some ML wheels (xgboost,
# prophet, coremltools) lag new releases.

on:
  # Intentionally no `paths:` filter. Two reasons:
  # 1. Railway has "Wait for CI" enabled and waits on ALL GitHub Actions
  #    before deploying. If backend.yml path-filters out iOS-only commits,
  #    iOS CI becomes the only gate and backend-side breakage can land on
  #    main unnoticed (this bit us 2026-04-16 when the alembic merge head
  #    broke the round-trip gate and went red for 2.5 hours because every
  #    subsequent main commit was iOS-only and skipped backend.yml).
  # 2. Env-var-only Railway redeploys queue behind any iOS-only commit
  #    that never triggered backend CI, so the "Wait for CI" queue never
  #    drains. Running backend.yml on every main push gives Railway a
  #    deterministic green-signal source.
  # Cost: ~1.5min of CI on PRs that don't touch backend. Acceptable.
  pull_request:

  push:
    branches: [main]

  workflow_dispatch:

jobs:
  pytest:
    name: pytest + ML gates + alembic round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Pin to 3.12 to match local dev. Bumping this requires manual
          # verification against every ML dep. See feedback_testing_rigor.md.
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      # Fast-failing gates run first so a broken import boundary / cold boot
      # surfaces in ~1 second instead of waiting through the full 157-test suite.

      - name: ML boundary gate (mandatory)
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: "stub-for-tests"
          # Pydantic-settings reads ``jwt_secret_key`` field from ``JWT_SECRET_KEY`` env.
          # The shorter ``JWT_SECRET`` that used to live here was silently ignored;
          # auth tests passed only because pydantic defaulted the field to "".
          JWT_SECRET_KEY: "test-jwt-secret-must-be-long-enough-for-hs256-aaaaaaaa"
          ENCRYPTION_KEY: "T0TXLkHFSeZRYGIIejSFVkhQrvRE-bWLkwXSkkdWiKQ="
        # AST walk of every backend/app/ file; fails if anything imports deeper
        # than backend.ml.api. See tests/ml/test_boundary.py for the rule.
        run: uv run python -m pytest tests/ml/test_boundary.py -v --tb=short

      - name: Cold-boot gate (mandatory)
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: "stub-for-tests"
          # Pydantic-settings reads ``jwt_secret_key`` field from ``JWT_SECRET_KEY`` env.
          # The shorter ``JWT_SECRET`` that used to live here was silently ignored;
          # auth tests passed only because pydantic defaulted the field to "".
          JWT_SECRET_KEY: "test-jwt-secret-must-be-long-enough-for-hs256-aaaaaaaa"
          ENCRYPTION_KEY: "T0TXLkHFSeZRYGIIejSFVkhQrvRE-bWLkwXSkkdWiKQ="
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        # Subprocess measures `from app.main import app` with -X importtime;
        # fails if pandas / scipy / statsmodels / xgboost / prophet / dowhy /
        # econml / shap / mlflow / evidently / nannyml / coremltools / hdbscan /
        # ruptures / pycatch22 / sklearn sneaks into the main-app import tree.
        run: uv run python -m pytest tests/ml/test_cold_boot.py -v --tb=short

      - name: Alembic migration round-trip smoke
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: "stub-for-tests"
          # Pydantic-settings reads ``jwt_secret_key`` field from ``JWT_SECRET_KEY`` env.
          # The shorter ``JWT_SECRET`` that used to live here was silently ignored;
          # auth tests passed only because pydantic defaulted the field to "".
          JWT_SECRET_KEY: "test-jwt-secret-must-be-long-enough-for-hs256-aaaaaaaa"
          ENCRYPTION_KEY: "T0TXLkHFSeZRYGIIejSFVkhQrvRE-bWLkwXSkkdWiKQ="
        # Upgrade to head, downgrade one step, upgrade back. Catches broken
        # downgrades and autogenerate noise that crept into hand-edited files.
        #
        # The "one step" is subtle: ``alembic downgrade -1`` fails with
        # "Ambiguous walk" when the current head is a merge migration, because
        # its ``down_revision`` is a tuple of two parents and alembic can't
        # pick which parent to walk to. See MEL-5 / revision b384bb88217f for
        # the case that bit us. Fix: inspect head's ``down_revision`` type and
        # pick the first parent deterministically for merge heads, fall back
        # to ``-1`` semantics otherwise.
        run: |
          TMPDB="${RUNNER_TEMP:-/tmp}/meld-ci-roundtrip.db"
          export DATABASE_URL="sqlite+aiosqlite:///${TMPDB}"
          echo "::group::alembic upgrade head"
          uv run python -m alembic upgrade head
          echo "::endgroup::"
          echo "::group::alembic downgrade one step (merge-aware)"
          DOWN_TARGET=$(uv run python -c "
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          cfg = Config('alembic.ini')
          sd = ScriptDirectory.from_config(cfg)
          heads = sd.get_heads()
          if len(heads) != 1:
              raise SystemExit(f'expected single head, got: {heads}')
          head = sd.get_revision(heads[0])
          down = head.down_revision
          if down is None:
              raise SystemExit(f'head {heads[0]} has no down_revision')
          target = down[0] if isinstance(down, tuple) else down
          print(target)
          ")
          echo "downgrading head to parent: $DOWN_TARGET"
          uv run python -m alembic downgrade "$DOWN_TARGET"
          echo "::endgroup::"
          echo "::group::alembic upgrade head (re-apply)"
          uv run python -m alembic upgrade head
          echo "::endgroup::"

      - name: Full pytest suite
        working-directory: backend
        env:
          # Test fixtures generate a fresh in-memory SQLite per test, so
          # production secrets aren't needed. Provide stub values so config
          # validation passes during import.
          ANTHROPIC_API_KEY: "stub-for-tests"
          # Pydantic-settings reads ``jwt_secret_key`` field from ``JWT_SECRET_KEY`` env.
          # The shorter ``JWT_SECRET`` that used to live here was silently ignored;
          # auth tests passed only because pydantic defaulted the field to "".
          JWT_SECRET_KEY: "test-jwt-secret-must-be-long-enough-for-hs256-aaaaaaaa"
          # Fernet test key — pinned in CI so test_encryption.py round-trips.
          # app.config.Settings() reads os.environ at import time, so this
          # MUST be set before pytest starts the process. (The legacy
          # plaintext codepath is exercised separately in
          # test_legacy_plaintext_passthrough, which decodes a non-Fernet
          # string regardless of the cipher key.)
          ENCRYPTION_KEY: "T0TXLkHFSeZRYGIIejSFVkhQrvRE-bWLkwXSkkdWiKQ="
        run: uv run python -m pytest tests/ -v --tb=short

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-pytest-output
          path: backend/.pytest_cache

  alembic-postgres:
    # Real-Postgres alembic round-trip. The 2026-04-29 incident root cause
    # was that the SQLite-only alembic round-trip above passes for migrations
    # that fail on real Postgres (boolean defaults using sa.text("0/1") that
    # SQLite accepts and Postgres-strict mode rejects, FK loops referencing
    # columns that don't exist on the target table, etc.). Every migration
    # in the chain must apply cleanly to a fresh Postgres or a future
    # reprovisioning event will hang prod for hours and risk further data loss.
    # See ~/.claude/projects/.../memory/feedback_postgres_dialect_parity.md
    name: alembic round-trip on Postgres
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: meld
          POSTGRES_PASSWORD: meld
          POSTGRES_DB: meld_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U meld -d meld_ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 20); do
            if pg_isready -h localhost -p 5432 -U meld -d meld_ci 2>/dev/null; then
              echo "postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "postgres did not become ready in 20s" >&2
          exit 1

      - name: Alembic round-trip on real Postgres (upgrade -> downgrade -> upgrade)
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: "stub-for-tests"
          JWT_SECRET_KEY: "test-jwt-secret-must-be-long-enough-for-hs256-aaaaaaaa"
          ENCRYPTION_KEY: "T0TXLkHFSeZRYGIIejSFVkhQrvRE-bWLkwXSkkdWiKQ="
          # app/database.py rewrites postgresql+asyncpg:// to postgresql:// for
          # alembic's sync DBAPI (psycopg2-binary). Same path as prod.
          DATABASE_URL: "postgresql+asyncpg://meld:meld@localhost:5432/meld_ci"
        run: |
          echo "::group::alembic upgrade head (from base)"
          uv run python -m alembic upgrade head
          echo "::endgroup::"
          echo "::group::alembic downgrade one step (merge-aware)"
          DOWN_TARGET=$(uv run python -c "
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          cfg = Config('alembic.ini')
          sd = ScriptDirectory.from_config(cfg)
          heads = sd.get_heads()
          if len(heads) != 1:
              raise SystemExit(f'expected single head, got: {heads}')
          head = sd.get_revision(heads[0])
          down = head.down_revision
          if down is None:
              raise SystemExit(f'head {heads[0]} has no down_revision')
          target = down[0] if isinstance(down, tuple) else down
          print(target)
          ")
          echo "downgrading head to parent: $DOWN_TARGET"
          uv run python -m alembic downgrade "$DOWN_TARGET"
          echo "::endgroup::"
          echo "::group::alembic upgrade head (re-apply)"
          uv run python -m alembic upgrade head
          echo "::endgroup::"

      - name: Verify expected tables exist
        working-directory: backend
        env:
          PGPASSWORD: meld
        # Spot-check: tables we know existed in prod must exist in CI after
        # alembic upgrade head. If the chain ever stops creating one of these,
        # this gate catches it before deploy. notification_templates and users
        # were both reported missing during the 2026-04-29 outage.
        run: |
          MISSING=0
          for tbl in users notification_templates oura_tokens chat_messages alembic_version; do
            FOUND=$(psql -h localhost -U meld -d meld_ci -tAc "SELECT 1 FROM information_schema.tables WHERE table_name = '$tbl'")
            if [ "$FOUND" != "1" ]; then
              echo "::error::expected table '$tbl' not present after upgrade head"
              MISSING=$((MISSING + 1))
            else
              echo "ok: $tbl"
            fi
          done
          exit $MISSING

  ruff:
    name: ruff (lint + format check)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install ruff
        working-directory: backend
        # ruff isn't a runtime dep — install it ad-hoc so we don't pollute
        # the prod lockfile with linter machinery.
        run: uv tool install ruff

      - name: Lint with ruff (including ml/ and tests/ml/)
        working-directory: backend
        # Allow warnings but fail on errors. We're not trying to enforce a
        # zero-warning bar yet — just catch syntax and obvious bugs.
        run: |
          uv tool run ruff check app/ ml/ tests/ --output-format=github || echo "::warning::ruff found issues"

      - name: Format check
        working-directory: backend
        run: |
          uv tool run ruff format --check app/ ml/ tests/ || echo "::warning::ruff format would reformat files"

  type-check:
    name: type imports
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Verify app imports cleanly
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: "stub-for-imports"
          # Pydantic-settings reads ``jwt_secret_key`` field from ``JWT_SECRET_KEY`` env.
          # The shorter ``JWT_SECRET`` that used to live here was silently ignored;
          # auth tests passed only because pydantic defaulted the field to "".
          JWT_SECRET_KEY: "test-jwt-secret-must-be-long-enough-for-hs256-aaaaaaaa"
          ENCRYPTION_KEY: "T0TXLkHFSeZRYGIIejSFVkhQrvRE-bWLkwXSkkdWiKQ="
        # Catches missing imports, syntax errors, and forward-reference bugs
        # without spinning up a real server. Complements the cold-boot gate.
        run: uv run python -c "from app.main import app; print('app imports ok')"

      - name: Verify ml.api imports cleanly
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: "stub-for-imports"
          # Pydantic-settings reads ``jwt_secret_key`` field from ``JWT_SECRET_KEY`` env.
          # The shorter ``JWT_SECRET`` that used to live here was silently ignored;
          # auth tests passed only because pydantic defaulted the field to "".
          JWT_SECRET_KEY: "test-jwt-secret-must-be-long-enough-for-hs256-aaaaaaaa"
          ENCRYPTION_KEY: "T0TXLkHFSeZRYGIIejSFVkhQrvRE-bWLkwXSkkdWiKQ="
        # ml.api is the ONLY public entrypoint for ML code. Must always import
        # cleanly without ML deps loading (see cold-boot gate).
        run: uv run python -c "import ml.api as api; print('ml.api imports ok')"
