name: Claude Code Review

# Phase 2 Loop 3: automatic PR review agent.
#
# Posts a review comment on every PR opened/synchronized. Checks for the
# project-specific patterns below. NEVER merges. NEVER pushes. Only comments.
#
# Requires a `ANTHROPIC_API_KEY` repo secret. If the secret is missing, the
# action will skip gracefully (no failure).

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: Claude PR Review
    runs-on: ubuntu-latest
    # Skip if PR is from dependabot or the author's own autonomous branches
    # that already went through review once.
    if: >
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'auto/reviewed')

    permissions:
      contents: read
      pull-requests: write
      issues: write
      # anthropics/claude-code-action@v1 requires OIDC for GitHub identity;
      # without id-token: write the action fails at setupGitHubToken.
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check API key is set
        id: has_key
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "ANTHROPIC_API_KEY secret is not set; skipping review."
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude review
        if: steps.has_key.outputs.has_key == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the Meld Code Review Agent. Review the PR diff against the project's specific conventions. Be concise. Only flag real issues; do not nitpick.

            ## Project context (Meld)

            - iOS health coach app (SwiftUI) + FastAPI backend + ML signal engine + Astro marketing site.
            - PHI (Protected Health Information) flows through the backend. Every new log line, every new Sentry event, every new API response must be scrutinized for PHI leakage.
            - Coach prompt is safety-critical. Changes to `backend/app/services/coach*`, `backend/app/services/chat*`, or any file touching `EVIDENCE_BOUND_SYSTEM_PROMPT` require a human review; flag emphatically.
            - 5-gate CI is mandatory: pytest, ML boundary, cold-boot, alembic round-trip, migration patterns. Never suggest `--no-verify` or skipping gates.
            - ML boundary: `backend/app/` may ONLY import `backend.ml.api` or `ml.api`. No deeper imports. See `backend/tests/ml/test_boundary.py` for the allowlist.
            - Cold-boot budget: `from app.main import app` must stay under 4 seconds. No top-level imports of pandas, scipy, statsmodels, xgboost, prophet, dowhy, econml, coremltools, mlflow, evidently, nannyml, shap, hdbscan, ruptures, pycatch22, or sklearn in `backend/app/`. See `backend/tests/ml/test_cold_boot.py`.
            - Shadow flags (`ml_shadow_*`): NEVER recommend flipping them autonomously. Flag if a PR attempts to.
            - Golden-data thresholds (e.g. `test_steps_lag1_drives_sleep_efficiency` r >= 0.30): NEVER recommend changing.

            ## Style rules (from memory/feedback_*.md)

            - **No em dashes** anywhere: not in code, comments, commit messages, UI copy, prompts, eval expectations. Use commas, colons, parentheses, or sentence breaks. Hyphens in compounds (7-day) are fine. En dashes (7 to 10) are acceptable but prefer "to".
            - **No emoji in code or UI**: coach outputs, commit messages, system prompts, design system. The Meld coach is a real voice, not an AI tell.
            - **4th grade reading level** in coach outputs and UI copy. Plain words, short sentences.
            - **No hardcoded colors** in iOS: use `Meld/DesignSystem/Tokens/Colors.swift` tokens. Flag any `Color(red:green:blue:)` or `UIColor(...)` literal in a view file.
            - **No em dashes in system prompts** either.

            ## Safety checks

            - PHI leakage: any new logger.info / logger.error / Sentry capture / API response must not contain user health metrics (steps, HRV, sleep stages, weight, BMI, heart rate, glucose, meal details). Flag if a log line embeds any of these.
            - Encryption: `ENCRYPTION_KEY` env, `cryptography.fernet`, and `EncryptedString` columns are load-bearing. Never suggest changes to how OAuth tokens or PHI are encrypted at rest.
            - Auth: JWT generation/validation, Sign in with Apple, HealthKit authorization scopes: flag any change for explicit human review.
            - Dependency additions: flag any new import from a package not already in `backend/pyproject.toml` or `Meld/Package.resolved`.

            ## Process

            Read the PR diff. Post a single review comment (not inline comments, not individual review requests):

            - If the PR is clean: "LGTM. No project-convention issues found."
            - If issues exist: bullet list under one of the severity headers:
              - `### Blocking` (safety, PHI, coach prompt, shadow flag, encryption)
              - `### Before merge` (style rule violations, missing tests, hardcoded colors)
              - `### FYI` (minor nits, readability suggestions)

            Cite specific file:line for every flag. Under 300 words total. Do NOT suggest rewrites, just identify the issue.

            ## iOS-specific rules (when PR touches Meld/** or MeldNotificationServiceExtension/**)

            - **No hardcoded colors**: flag any `Color(red:green:blue:)`, `Color(.sRGB, ...)`, `UIColor(red:green:blue:)`, `UIColor.init(_, red:)`, or literal hex strings like `"#FF00FF"`/`0xFF00FF` in any file under `Meld/Views/**` or `Meld/Components/**`. These must use a design-system token from `Meld/DesignSystem/Tokens/DSColor.swift` instead. Exception: `Meld/DesignSystem/Tokens/DSColor.swift` itself is where the primitives live; hex literals are OK there.

            - **No hardcoded font sizes or weights**: flag any `.font(.system(size: 17))` or similar literal sizes in view files. Must use a token from `Meld/DesignSystem/Tokens/DSTypography.swift`.

            - **No hardcoded spacing**: flag any `.padding(16)` or similar in view files that should use tokens from `Meld/DesignSystem/Tokens/DSSpacing.swift`. Accept `.padding()` (default) or `.padding(.horizontal)`.

            - **Accessibility labels**: flag any `Button`, `Image(systemName:)`, tappable `Circle()`/`RoundedRectangle()`, or similar interactive view that lacks a `.accessibilityLabel(...)` modifier. Decorative elements can use `.accessibilityHidden(true)`.

            - **No emoji in Swift string literals** under `Meld/**`: memory `feedback_design.md` says no emoji icons. Flag any string literal in `.swift` files containing Unicode code points in the emoji ranges (U+1F300-U+1FAFF, U+2600-U+27BF). Exception: tests that intentionally assert emoji handling, and any `// MARK:` or doc-comment decorations.

            - **Design-token value changes (Tier 2)**: if the PR modifies values (not just adds new tokens) in `Meld/DesignSystem/Tokens/DSColor.swift`, `DSTypography.swift`, or `DSSpacing.swift`, flag as "Tier 2 Product: design token value change needs Brock's eye, ripples across the whole app".

            If the PR ONLY touches iOS files (`Meld/**`, `project.yml`), skip backend-specific checks. If the PR ONLY touches `website/**`, skip ML/PHI/coach checks.

          claude_args: |
            --model claude-sonnet-4-5
            --max-turns 20

      - name: Note skip if no API key
        if: steps.has_key.outputs.has_key == 'false'
        run: |
          echo "::warning::Skipped Claude review: ANTHROPIC_API_KEY secret is not set on this repo. Add it at Settings -> Secrets and variables -> Actions -> New repository secret."
