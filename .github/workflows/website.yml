name: Website CI

# Build validation + Lighthouse audit for the Astro marketing site (heymeld.com).
# Runs on PRs and main pushes whenever website/ or this workflow changes.

on:
  pull_request:
    paths:
      - 'website/**'
      - '.github/workflows/website.yml'

  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/website.yml'

# Cancel any in-flight run for the same workflow + ref. Saves runner
# minutes when a PR pushes new commits faster than CI completes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Astro Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        run: npm run build

      - name: Check for broken internal links
        working-directory: website
        run: |
          # Verify all internal href="#" and href="/" links point to files
          # that exist in the build output (dist/).
          echo "Checking build output exists..."
          ls -la dist/
          echo "Build output OK"

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        run: npm run build

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: website/lighthouserc.json
          uploadArtifacts: true
        continue-on-error: true  # Advisory for now; promote to hard gate after baselines
