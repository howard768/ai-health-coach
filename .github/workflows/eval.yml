name: Coach Eval Suite

on:
  # Run on PRs that touch the prompt or coach engine
  pull_request:
    paths:
      - 'backend/app/services/coach_engine.py'
      - 'backend/app/services/claude.py'
      - 'evals/**'

  # Run on pushes to main (same paths)
  push:
    branches: [main]
    paths:
      - 'backend/app/services/coach_engine.py'
      - 'backend/app/services/claude.py'
      - 'evals/**'

  # Manual trigger
  workflow_dispatch:

# Cancel any in-flight run for the same workflow + ref. Saves runner
# minutes when a PR pushes new commits faster than CI completes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  promptfoo:
    name: Promptfoo (55 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Promptfoo
        run: npm install -g promptfoo

      - name: Run eval suite
        working-directory: evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npx promptfoo eval --no-cache -o results.json 2>&1 | tee eval-output.txt

      - name: Quality gates
        working-directory: evals
        run: |
          python3 -c "
          import json, sys

          with open('results.json') as f:
              data = json.load(f)

          results = data.get('results', {})
          stats = results.get('stats', {})
          successes = stats.get('successes', 0)
          failures = stats.get('failures', 0)
          total = successes + failures
          pass_rate = (successes / total * 100) if total > 0 else 0

          print(f'Total: {total}')
          print(f'Passed: {successes}')
          print(f'Failed: {failures}')
          print(f'Pass Rate: {pass_rate:.1f}%')

          # Quality gate: 90% minimum pass rate
          if pass_rate < 90:
              print(f'QUALITY GATE FAILED: {pass_rate:.1f}% < 90% minimum')
              sys.exit(1)

          # Safety gate: all safety tests must pass
          safety_failures = []
          for r in results.get('results', []):
              desc = r.get('description', '')
              if 'Safety' in desc and not r.get('success', True):
                  safety_failures.append(desc)

          if safety_failures:
              print(f'SAFETY GATE FAILED: {len(safety_failures)} safety tests failed:')
              for f_item in safety_failures:
                  print(f'  - {f_item}')
              sys.exit(1)

          # Adversarial gate: all adversarial tests must pass
          adversarial_failures = []
          for r in results.get('results', []):
              desc = r.get('description', '')
              if 'Adversarial' in desc and not r.get('success', True):
                  adversarial_failures.append(desc)

          if adversarial_failures:
              print(f'ADVERSARIAL GATE FAILED: {len(adversarial_failures)} adversarial tests failed:')
              for f_item in adversarial_failures:
                  print(f'  - {f_item}')
              sys.exit(1)

          print('All quality gates passed.')
          "

      - name: Upload Promptfoo results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: promptfoo-results
          path: |
            evals/results.json
            evals/eval-output.txt

  data-fidelity:
    name: Data Fidelity (13 golden tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Promptfoo
        run: npm install -g promptfoo

      - name: Run data fidelity evals
        working-directory: evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npx promptfoo eval -c golden_data_fidelity.yaml --no-cache -o fidelity-results.json 2>&1 | tee fidelity-output.txt

      - name: Data fidelity gate
        working-directory: evals
        run: |
          python3 -c "
          import json, sys

          with open('fidelity-results.json') as f:
              data = json.load(f)

          results = data.get('results', {})
          stats = results.get('stats', {})
          successes = stats.get('successes', 0)
          failures = stats.get('failures', 0)
          total = successes + failures
          pass_rate = (successes / total * 100) if total > 0 else 0

          print(f'Data Fidelity: {successes}/{total} passed ({pass_rate:.1f}%)')

          # All data fidelity tests must pass — these are the most critical
          if failures > 0:
              print(f'DATA FIDELITY GATE FAILED: {failures} test(s) failed')
              for r in results.get('results', []):
                  if not r.get('success', True):
                      print(f'  - {r.get(\"description\", \"unknown\")}')
              sys.exit(1)

          print('All data fidelity tests passed.')
          "

      - name: Upload fidelity results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fidelity-results
          path: |
            evals/fidelity-results.json
            evals/fidelity-output.txt

  python-quality:
    name: Quality checks (reading level, faithfulness, uniqueness)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        working-directory: evals
        run: uv sync

      - name: Prompt parity check (no API calls)
        working-directory: evals
        run: uv run python -m pytest test_prompt_parity.py -v --tb=short

      - name: Run quality tests
        working-directory: evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python -m pytest test_coach_quality.py -v --tb=short 2>&1 | tee pytest-output.txt

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results
          path: evals/pytest-output.txt

  pr-comment:
    name: PR Summary
    needs: [promptfoo, data-fidelity, python-quality]
    if: github.event_name == 'pull_request' && always()
    runs-on: ubuntu-latest
    # Default GITHUB_TOKEN is read-only on non-same-repo events. Even on
    # same-repo PRs the token needs explicit pull-requests:write to post a
    # summary comment; without it actions/github-script fails with
    # "Resource not accessible by integration".
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Download Promptfoo results
        uses: actions/download-artifact@v8
        with:
          name: promptfoo-results
          path: evals/

      - name: Comment on PR
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let body = '## Coach Eval Results\n\n';

            try {
              const data = JSON.parse(fs.readFileSync('evals/results.json', 'utf8'));
              const stats = data.results?.stats || {};
              const successes = stats.successes || 0;
              const failures = stats.failures || 0;
              const total = successes + failures;
              const passRate = total > 0 ? (successes / total * 100).toFixed(1) : 0;

              const status = failures === 0 ? 'PASS' : 'FAIL';
              body += `**Promptfoo**: ${status} (${successes}/${total}, ${passRate}%)\n\n`;

              if (failures > 0) {
                const failedTests = data.results?.results
                  ?.filter(r => !r.success)
                  ?.map(r => `- ${r.vars?.query || r.description}`)
                  ?.join('\n') || 'None';
                body += `### Failed Tests\n${failedTests}\n\n`;
              }
            } catch (e) {
              body += '**Promptfoo**: results not available\n\n';
            }

            const promptfooStatus = '${{ needs.promptfoo.result }}';
            const pytestStatus = '${{ needs.python-quality.result }}';
            const overall = (promptfooStatus === 'success' && pytestStatus === 'success') ? '✅' : '❌';

            body += `**Python Quality**: ${pytestStatus === 'success' ? 'PASS' : 'FAIL'} (reading level + faithfulness + uniqueness)\n\n`;
            body += `${overall} **Overall**: ${overall === '✅' ? 'All gates passed' : 'Some gates failed'}\n\n`;
            body += `*Run ID: ${context.runId}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
