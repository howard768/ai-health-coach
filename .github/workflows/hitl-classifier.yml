name: HITL Classifier

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  # `contents: write` is needed for `gh pr merge --merge` on the Tier 0
  # path. Without it GitHub rejects with
  # `Resource not accessible by integration (mergePullRequest)`.
  contents: write
  pull-requests: write
  issues: write

jobs:
  classify:
    name: Classify PR tier
    runs-on: ubuntu-latest
    # Skip dependabot (handled by dependabot-automerge.yml) and fork PRs (safety).
    if: >
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Kill switch check
        id: killswitch
        env:
          AUTO_MERGE_ENABLED: ${{ vars.AUTO_MERGE_ENABLED }}
        run: |
          if [ "${AUTO_MERGE_ENABLED}" != "true" ]; then
            echo "AUTO_MERGE_ENABLED=${AUTO_MERGE_ENABLED:-unset}; skipping classifier."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.killswitch.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute diff file list
        if: steps.killswitch.outputs.enabled == 'true'
        id: files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh api --paginate "/repos/${REPO}/pulls/${PR_NUM}/files" --jq '.[].filename' > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: Classify changes
        if: steps.killswitch.outputs.enabled == 'true'
        id: classify
        run: python3 .github/scripts/hitl_classify.py
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Tier 3, block and close
        if: steps.killswitch.outputs.enabled == 'true' && steps.classify.outputs.tier == 'tier3'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          REASONS: ${{ steps.classify.outputs.reasons }}
          MATCHED: ${{ steps.classify.outputs.matched_files }}
        run: |
          BODY=$(printf '### Tier 3 BLOCKED\n\nThis PR touches paths or content classified as Tier 3 (safety / encryption / evidence-bound prompt / PHI / credentials). These changes must be authored by Brock and cannot be auto-merged or auto-drafted.\n\n**Matched:**\n%s\n\n**Details:**\n%s\n\nClosing this PR. If this is a false positive, edit `.github/hitl-config.json` and reopen.' "$MATCHED" "$REASONS")
          gh pr comment "$PR_NUM" --body "$BODY"
          gh pr close "$PR_NUM"

      - name: Tier 2, label + comment (soft signal to Brock)
        if: steps.killswitch.outputs.enabled == 'true' && steps.classify.outputs.tier == 'tier2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          REASONS: ${{ steps.classify.outputs.reasons }}
          MATCHED: ${{ steps.classify.outputs.matched_files }}
        run: |
          # Ensure label exists, then apply it. The label is the gate: the
          # Tier 0 auto-merge path only runs when tier == 'tier0', so a PR
          # classified as Tier 2 will NOT be auto-merged by this workflow.
          gh label create product-review --color FBCA04 --description "Tier 2: needs Brock's product review" 2>/dev/null || true
          gh pr edit "$PR_NUM" --add-label product-review

          BODY=$(printf '### Tier 2 PRODUCT, Brock reviews\n\nThis PR touches paths classified as Tier 2 (coach / chat_stream / design tokens / onboarding / website content). These have product surface implications and will not be auto-merged by the HITL classifier.\n\n**Matched files:**\n%s\n\n**Why:**\n%s\n\nBrock reviews, Claude executes the merge on his approval. The `product-review` label is the signal; the PR stays in its current draft/ready state (GITHUB_TOKEN cannot convert to draft without an app token, so we rely on the label instead).\n\nLinear issue creation will be handled by the Linear MCP from a separate scheduled task.' "$MATCHED" "$REASONS")
          gh pr comment "$PR_NUM" --body "$BODY"

      - name: Tier 0, wait for required checks, then auto-merge
        if: steps.killswitch.outputs.enabled == 'true' && steps.classify.outputs.tier == 'tier0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "Classified as Tier 0 engineering. Waiting for Claude PR Review and Backend CI checks to succeed."

          # Poll check-runs for the head SHA until the required checks report
          # SUCCESS, or bail after ~30 minutes.
          #
          # Check-run names must match the `name:` field of the CheckRun entity
          # returned by the check-runs API, NOT the workflow name. Previously
          # this listed "Backend CI" (the workflow name) which never matched
          # any check-run and caused the classifier to hang 30 minutes on
          # every Tier 0 PR. Use the actual job-level check-run names:
          #   - "Claude PR Review"  (from workflow: Claude Code Review)
          #   - "pytest + ML gates + alembic round-trip"  (from workflow: Backend CI)
          # Ruff and type-imports checks are advisory; not in REQUIRED.
          REQUIRED=("Claude PR Review" "pytest + ML gates + alembic round-trip")
          DEADLINE=$(( $(date +%s) + 1800 ))

          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            RUNS=$(gh api "/repos/${REPO}/commits/${HEAD_SHA}/check-runs" --paginate --jq '.check_runs[] | {name: .name, status: .status, conclusion: .conclusion}')
            all_ok=true
            for name in "${REQUIRED[@]}"; do
              status_line=$(echo "$RUNS" | jq -r --arg n "$name" 'select(.name == $n) | "\(.status)/\(.conclusion)"' | tail -n 1)
              if [ -z "$status_line" ]; then
                echo "Check '$name' not reported yet."
                all_ok=false
                break
              fi
              case "$status_line" in
                completed/success)
                  echo "Check '$name' = success."
                  ;;
                completed/failure|completed/cancelled|completed/timed_out|completed/action_required)
                  echo "Check '$name' failed ($status_line). Aborting auto-merge."
                  exit 0
                  ;;
                *)
                  echo "Check '$name' still running ($status_line)."
                  all_ok=false
                  break
                  ;;
              esac
            done
            if [ "$all_ok" = "true" ]; then
              # Direct merge, not --auto. Auto-merge requires the repo-level
              # "Allow auto-merge" setting to be enabled AND calls
              # enablePullRequestAutoMerge via GraphQL, which GITHUB_TOKEN
              # does not have scope for by default. Since we just polled
              # for all required checks to be SUCCESS, we can merge directly.
              echo "All required checks green; merging directly."
              gh pr merge "$PR_NUM" --merge

              # Post-merge fan-out for push-triggered workflows.
              #
              # GitHub deliberately suppresses workflow runs for push events
              # authored by GITHUB_TOKEN, see
              # https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow
              # ("events triggered by the GITHUB_TOKEN ... will not create a
              # new workflow run"). That means auto-merged PRs never fire
              # `on: push: branches: [main]` workflows like TestFlight
              # Release, even when their path filter matches.
              #
              # Workaround: from inside this auto-merge step, manually
              # dispatch the iOS-touching workflow when the merged PR
              # actually touched iOS sources. Mirrors the testflight.yml
              # path filter so backend-only or website-only PRs don't
              # burn macOS-runner minutes.
              #
              # Long-term fix is a fine-grained PAT in `AUTOMERGE_PAT` so
              # the merge commit's push event fires normally (no fan-out
              # needed). When that secret exists, drop this whole block.
              echo "Checking whether to fan out TestFlight Release."
              CHANGED=$(gh pr view "$PR_NUM" --json files --jq '.files[].path')
              if echo "$CHANGED" | grep -qE '^(Meld/|Meld\.xcodeproj/|MeldNotificationServiceExtension/|project\.yml$|\.github/workflows/testflight\.yml$)'; then
                echo "iOS sources touched, dispatching TestFlight Release."
                gh workflow run "TestFlight Release" --ref main \
                  || echo "WARN: failed to dispatch TestFlight Release; check manually."
              else
                echo "No iOS-source changes, skipping TestFlight dispatch."
              fi
              exit 0
            fi
            sleep 30
          done

          echo "Timed out waiting for required checks after 30 minutes. Leaving PR for manual review."
