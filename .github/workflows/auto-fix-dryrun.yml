name: Auto-Fix Agent (Dry Run)

# Phase 2 Loop 3 PR 1 - per ~/.claude/plans/autofix-agent-ultraplan.md
#
# This is the DRY-RUN layer of a 3-layer rollout. It ONLY posts a PROPOSAL
# comment on a Linear issue. It MUST NOT write files, create branches, push
# git, or open PRs. The agent's allowed-tools list enforces this; the prompt
# repeats the constraint for belt-and-suspenders.
#
# Fired by the `meld-autofix-poller` scheduled task every 15 min for each
# Linear issue labeled `auto/fix-proposed` that does not already have
# `auto/proposal-posted` or any `auto/refused-*` label.

on:
  workflow_dispatch:
    inputs:
      linear_issue_id:
        description: 'Linear issue identifier (e.g. MEL-123)'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: auto-fix-dryrun-${{ inputs.linear_issue_id }}
  cancel-in-progress: false

jobs:
  dryrun:
    name: Propose fix for ${{ inputs.linear_issue_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Kill switch check
        id: killswitch
        run: |
          if [ "${{ vars.ENABLE_AUTO_FIX_AGENT }}" != "true" ]; then
            echo "::notice title=Auto-fix disabled::Repo variable ENABLE_AUTO_FIX_AGENT is not 'true' (value: '${{ vars.ENABLE_AUTO_FIX_AGENT }}'). Exiting without action. Set the variable to 'true' to activate."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Check secret
        id: secret
        if: steps.killswitch.outputs.enabled == 'true'
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::warning title=Missing secret::ANTHROPIC_API_KEY is not set; skipping dry-run."
            echo "present=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "present=true" >> "$GITHUB_OUTPUT"

      - name: Checkout (read-only)
        if: steps.killswitch.outputs.enabled == 'true' && steps.secret.outputs.present == 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Run Claude dry-run proposal
        if: steps.killswitch.outputs.enabled == 'true' && steps.secret.outputs.present == 'true'
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 5
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINEAR_ISSUE_ID: ${{ inputs.linear_issue_id }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-5
            --max-turns 5
            --allowed-tools "Read,Glob,Grep,mcp__linear__get_issue,mcp__linear__list_comments,mcp__linear__save_comment,mcp__linear__list_issue_labels,mcp__linear__save_issue"
          prompt: |
            You are the Meld auto-fix agent running in DRY-RUN mode.

            You MUST NOT write files, run shell commands, run git, push, or open PRs.
            Your ONLY outputs are (a) a Linear comment on issue ${{ inputs.linear_issue_id }}
            and (b) a Linear label update on that same issue. Nothing else.

            ## Goal

            Read Linear issue `${{ inputs.linear_issue_id }}` and the relevant Meld
            source files, then post a PROPOSAL comment on that issue describing the
            smallest correct fix. Do NOT implement the fix. Do NOT create a branch.

            ## Hard refuse list (Tier 3 per ~/.claude/plans/hitl-tier-model.md)

            If the fix would touch ANY of these, DO NOT propose the fix. Instead,
            post a refusal comment citing the exact rule, add label
            `auto/refused-safety`, and stop.

            - `backend/app/services/coach*` (coach prompt + response logic)
            - `backend/app/services/chat_stream*`
            - `backend/app/services/safety*`
            - Any file containing the string `EVIDENCE_BOUND_SYSTEM_PROMPT`
            - Any file containing `ml_shadow_` (shadow flag flips)
            - `backend/app/core/encryption.py` or any use of `EncryptedString`
            - `backend/alembic/versions/*` that changes encrypted health columns
              (`health_metric_records`, `sleep_records`, `chat_messages`, `meals`,
              `oura_*`, `garmin_*`, `peloton_*`, `heart_rate`, `hrv`,
              `user_correlations`, `ml_features`, `ml_baselines`, `ml_insights`)
            - `backend/tests/ml/test_*golden*.py` (golden-data thresholds)
            - `backend/tests/ml/test_boundary.py`, `backend/tests/ml/test_cold_boot.py`
            - `Meld/Services/Sync/HealthKitManager*` when the diff changes scope requests
            - `.env*`, `**/*.p8`, `**/*.pem` (credential files)
            - `.github/workflows/code-review.yml`, `.github/workflows/auto-fix*.yml`,
              `.github/workflows/hitl-classifier.yml` (meta-guard)
            - `~/.claude/plans/hitl-tier-model.md` and the tier classifier itself
            - `~/.claude/projects/**/memory/feedback_coach_prompt.md`

            ## Input budget

            You may read AT MOST 20 files and AT MOST 200KB of total file content.
            Stop reading as soon as you have enough to write the proposal.
            You have AT MOST 5 turns total.

            ## Steps

            1. Use the Linear MCP to fetch issue `${{ inputs.linear_issue_id }}`:
               title, description, and up to the 10 most recent comments.
            2. Identify the target area. From the issue, extract file paths,
               function names, error messages, test failures, or feature specs.
            3. Read only the files needed to understand the fix. Respect the
               20-file / 200KB cap. Use Glob/Grep to locate, Read to inspect.
            4. Check every candidate file path against the refuse list above.
               If ANY would be touched, post a refusal comment and label
               `auto/refused-safety`. Stop.
            5. Estimate diff size. If the smallest correct fix would add+remove
               more than 500 lines, post a comment explaining the scope, label
               `auto/refused-oversize`, and stop.
            6. If the issue is ambiguous (under ~200 chars of real signal, or
               you'd need to ask a clarifying question), post a comment asking
               Brock to expand, label `auto/needs-clarification`, and stop.
            7. Otherwise, post a Linear comment with this exact structure:

               ```
               ## Proposed fix (dry-run, no code written)

               **What I would change (natural language):**
               <1-3 sentence description of the behavioral change>

               **Files and approximate line counts:**
               - `path/to/file1.py` (~N lines added, ~M removed)
               - `path/to/file2.py` (~N lines added, ~M removed)

               **Why this is the smallest correct fix:**
               <2-4 sentences>

               **Test plan:**
               - Existing coverage: `tests/path/test_x.py::test_y` covers this path
               - New tests needed: <list, or "none">

               **Risks / open questions:**
               <anything Brock should know before approving>

               ---
               Generated by `.github/workflows/auto-fix-dryrun.yml`. No branch
               was created. No PR was opened. No files were written.
               ```

               Then add label `auto/proposal-posted` to the same issue.

            ## Absolute rules (repeat)

            - NEVER write a file to disk.
            - NEVER run git, gh, npm, pip, uv, or any shell command.
            - NEVER push to a branch.
            - NEVER open a PR.
            - NEVER remove the `auto/fix-proposed` label; the poller uses it.
            - Only add exactly ONE of the auto/* outcome labels.

            If you cannot post a comment for any reason (API error, unclear issue
            state), exit quietly with a diagnostic note in your final message. Do
            not retry destructively.
