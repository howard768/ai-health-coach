name: Auto-Fix Agent (Implement)

# Phase 2 Loop 3 PR 2 - per ~/.claude/plans/autofix-agent-ultraplan.md
#
# This is the CODE-WRITING layer of the 3-layer rollout. It graduates the
# agent from dry-run proposal (auto-fix-dryrun.yml) to actually implementing
# the fix, running the 5-gate CI locally, and opening a DRAFT PR for Brock.
#
# Promotion flow (two Brock-gated labels):
#   1. Brock labels Linear issue `auto/fix-proposed`.
#      meld-autofix-poller fires auto-fix-dryrun.yml.
#      Dry-run agent posts a proposal comment, labels `auto/proposal-posted`.
#   2. Brock reviews the proposal. If it looks good, adds `auto/fix-approved`.
#   3. meld-autofix-impl-poller (this workflow's trigger) sees both labels,
#      fires this workflow. Implementation agent writes code, runs CI, opens
#      a DRAFT PR. Never marks ready. Never merges.
#   4. Brock reviews the PR. If satisfied, marks ready and merges. Or closes.
#
# Hard safety rails (Tier 3 refuse list) match .github/hitl-config.json +
# ultraplan refuse list. Diff budget: 500 lines total, 300 per file.

on:
  workflow_dispatch:
    inputs:
      linear_issue_id:
        description: 'Linear issue identifier (e.g. MEL-123)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  # anthropics/claude-code-action@v1 requires OIDC for GitHub identity.
  id-token: write

concurrency:
  group: auto-fix-impl-${{ inputs.linear_issue_id }}
  cancel-in-progress: false

jobs:
  implement:
    name: Implement fix for ${{ inputs.linear_issue_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Kill switch check
        id: killswitch
        env:
          ENABLE_AUTO_FIX_AGENT: ${{ vars.ENABLE_AUTO_FIX_AGENT }}
        run: |
          if [ "${ENABLE_AUTO_FIX_AGENT}" != "true" ]; then
            echo "::notice title=Auto-fix disabled::Repo variable ENABLE_AUTO_FIX_AGENT is not 'true' (value: '${ENABLE_AUTO_FIX_AGENT:-unset}'). Exiting without action. Set the variable to 'true' to activate."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Check secret
        id: secret
        if: steps.killswitch.outputs.enabled == 'true'
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::warning title=Missing secret::ANTHROPIC_API_KEY is not set; skipping implementation run."
            echo "present=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "present=true" >> "$GITHUB_OUTPUT"

      - name: Checkout (full history for branch creation)
        if: steps.killswitch.outputs.enabled == 'true' && steps.secret.outputs.present == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use default GITHUB_TOKEN so the agent can push branches.
          persist-credentials: true

      - name: Install uv (for 5-gate CI checks)
        if: steps.killswitch.outputs.enabled == 'true' && steps.secret.outputs.present == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Sync backend deps
        if: steps.killswitch.outputs.enabled == 'true' && steps.secret.outputs.present == 'true'
        working-directory: backend
        run: uv sync

      - name: Configure git identity for agent commits
        if: steps.killswitch.outputs.enabled == 'true' && steps.secret.outputs.present == 'true'
        run: |
          git config user.name "meld-autofix-agent"
          git config user.email "meld-autofix-agent@users.noreply.github.com"

      - name: Run Claude auto-fix implementation
        if: steps.killswitch.outputs.enabled == 'true' && steps.secret.outputs.present == 'true'
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 25
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINEAR_ISSUE_ID: ${{ inputs.linear_issue_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 5-gate CI env (see backend.yml for provenance).
          JWT_SECRET_KEY: "test-jwt-secret-must-be-long-enough-for-hs256-aaaaaaaa"
          ENCRYPTION_KEY: "T0TXLkHFSeZRYGIIejSFVkhQrvRE-bWLkwXSkkdWiKQ="
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-5
            --max-turns 40
          prompt: |
            You are the Meld auto-fix implementation agent. A Linear issue has
            been approved for auto-fix. Read the issue, implement the fix,
            verify CI passes locally, and open a DRAFT PR.

            ## Inputs
            - Linear issue ID: ${{ inputs.linear_issue_id }}
            - Repository: howard768/ai-health-coach
            - Base branch: main

            ## Safety refuse list (HARD STOP)

            If the fix would require touching ANY of these files or patterns,
            stop immediately, comment on the Linear issue explaining why,
            apply label `auto/refused-safety`, and exit. Do NOT create a branch.

            - backend/app/services/safety*
            - backend/app/services/coach*
            - backend/app/services/chat_stream*
            - backend/app/core/encryption.py
            - Any file containing the string EVIDENCE_BOUND_SYSTEM_PROMPT
            - Any file containing ml_shadow_ (flag FLIPS, not new definitions)
            - backend/alembic/versions/* that touches health_metric_records,
              sleep_records, chat_messages, meals, oura_*, garmin_*, peloton_*,
              user_correlations, ml_features, ml_baselines, ml_insights columns
            - backend/tests/ml/test_*golden*.py
            - Meld/Services/Sync/HealthKitManager* (HealthKit scope changes)
            - .env*, *.p8, *.pem (credentials)
            - .github/workflows/code-review.yml, auto-fix*.yml,
              hitl-classifier.yml, migration-health.yml,
              ios-structural-checks.yml, dependabot-automerge.yml
              (meta-guard: don't let the auto-fix edit itself)

            ## Diff budget

            - Total diff (lines added + removed): HARD LIMIT 500. If the
              implementation requires more, stop, comment on the Linear issue,
              apply label `auto/too-large`, and exit.
            - Any single file with more than 300 lines added: stop, comment,
              apply `auto/refused-oversize`, and exit.

            ## Flow

            1. Read the Linear issue body + all comments (including the PR 1
               auto-proposal, which is the spec). Use
               mcp__linear__get_issue and mcp__linear__list_comments.
            2. Check the safety refuse list against the proposed files. If
               matched, refuse per the rules above.
            3. Create a branch named `claude/auto-fix-${{ inputs.linear_issue_id }}`.
               Use:
                 git checkout -b claude/auto-fix-${{ inputs.linear_issue_id }}
            4. Implement the fix. Follow the proposal's plan from PR 1. If
               the proposal is absent or too vague, comment
               `auto/needs-clarification` and exit.
            5. Write tests that cover the fix. Per
               feedback_testing_rigor.md: unit + regression + at least one
               smoke-level test.
            6. Run the 5-gate local CI in order. Stop on first failure:
               a. pytest:
                    cd backend && uv run python -m pytest tests/ -v --tb=short
               b. cold-boot (under 4.0s real):
                    cd backend && JWT_SECRET_KEY=test ENCRYPTION_KEY='T0TXLkHFSeZRYGIIejSFVkhQrvRE-bWLkwXSkkdWiKQ=' ANTHROPIC_API_KEY=fake DATABASE_URL='sqlite+aiosqlite:///:memory:' /usr/bin/time -p .venv/bin/python -c 'from app.main import app'
                  Verify the "real" line is under 4.00.
               c. ML boundary:
                    cd backend && uv run python -m pytest tests/ml/test_boundary.py -v --tb=short
               d. Alembic round-trip (merge-head-aware, matches backend.yml):
                    cd backend
                    TMPDB="/tmp/meld-impl-roundtrip-${{ inputs.linear_issue_id }}.db"
                    export DATABASE_URL="sqlite+aiosqlite:///$TMPDB"
                    uv run python -m alembic upgrade head
                    DOWN_TARGET=$(uv run python -c "from alembic.config import Config; from alembic.script import ScriptDirectory; cfg = Config('alembic.ini'); sd = ScriptDirectory.from_config(cfg); heads = sd.get_heads(); assert len(heads)==1, heads; h = sd.get_revision(heads[0]); d = h.down_revision; print(d[0] if isinstance(d, tuple) else d)")
                    uv run python -m alembic downgrade "$DOWN_TARGET"
                    uv run python -m alembic upgrade head
               e. Ruff (warnings OK, errors = fail):
                    cd backend && uv tool run ruff check app/ ml/ tests/
            7. If ANY gate fails:
                  - Commit what's there with message
                    `auto-fix wip: {linear_issue_title}`
                  - Push the branch to origin.
                  - Comment on the Linear issue with the failure details + a
                    link to the branch.
                  - Apply label `auto/ci-red`.
                  - Exit. Do NOT open a PR.
            8. If all gates pass:
                  - Commit with message `auto-fix: {linear_issue_title}` plus
                    a body that references the Linear issue.
                  - Push the branch.
                  - Open a DRAFT PR titled `auto-fix: {linear_issue_title}`:
                      gh pr create --draft --title "auto-fix: ..." \
                        --body "..." --base main \
                        --head claude/auto-fix-${{ inputs.linear_issue_id }}
                    Body must include:
                      - Link to the Linear issue.
                      - One-paragraph summary of what changed.
                      - Test plan (which tests were added).
                      - Safety note: "Auto-generated by meld-autofix-impl.
                        Brock reviews before marking ready. Do NOT mark
                        ready until you have read the diff."
                  - Apply label `auto/pr-opened` to the Linear issue.
                  - Post a comment on the Linear issue linking the PR.

            ## Budget

            - Max 40 turns.
            - Max total token spend: $5. If hit, abort, apply
              `auto/budget-exceeded`, exit.

            ## Tooling restrictions

            - Allowed: Bash (for git/uv/pytest), Read, Edit, Write, Grep,
              Glob, Linear MCP (save_issue, save_comment, get_issue,
              list_comments, list_issue_labels) for Linear writes only.
            - NOT allowed: direct API calls to anything outside GitHub +
              Linear + the local repo.
            - NEVER: merge the PR. Always DRAFT. Brock marks ready.
            - NEVER: push to main. Only to `claude/auto-fix-*` branches.
            - NEVER: force-push.
            - NEVER: skip CI gates (no --no-verify, no commenting them out).
            - NEVER: commit secrets, .env files, *.p8, or *.pem files.

            ## Commit hygiene

            - Use git commit with a HEREDOC body. No em dashes in messages.
            - Each commit message ends with:
                Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>
            - Use `gh pr create --draft` not `--fill`. Always explicit body.

            If anything in this plan is blocked (a tool missing, Linear
            unreachable, branch already exists from a prior run), stop with
            a diagnostic comment on the Linear issue and exit. Do not retry
            destructively.

      - name: Note skip if disabled
        if: steps.killswitch.outputs.enabled != 'true'
        run: |
          echo "::notice::auto-fix-impl skipped, ENABLE_AUTO_FIX_AGENT not true."

      - name: Note skip if no secret
        if: steps.killswitch.outputs.enabled == 'true' && steps.secret.outputs.present != 'true'
        run: |
          echo "::warning::auto-fix-impl skipped, ANTHROPIC_API_KEY not set."
