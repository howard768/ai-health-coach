name: Health Checks (Cron)

# Replaces five PC-bound Claude Code scheduled tasks. Each cron tick runs a
# pure shell check; on failure, scripts/file_linear_alert.py posts (or
# comments on) a Linear issue via Linear's GraphQL API. Cost is $0 always
# because no LLM is involved in the alert path.
#
# History note: this used to invoke anthropics/claude-code-action@v1 on
# the failure path. That turned out to be flaky (the action would report
# success after one turn without making any MCP tool calls, and
# github.run_started_at sometimes resolved to an empty string). Switched
# to direct GraphQL via a small Python helper for predictability.
#
# Required GitHub secret: LINEAR_API_KEY (Personal API key with workspace
# write scope, generated at https://linear.app/settings/api).
#
# Crons are in UTC.
#   - backend-health (every 4h)        meld-backend-health
#   - website-health (daily)           meld-website-health
#   - pipeline-health (daily)          meld-pipeline-health
#   - data-quality (daily)             meld-data-quality
#   - ssl-dns-check (1st and 15th)     meld-ssl-dns-check

on:
  schedule:
    - cron: '13 */4 * * *'      # backend-health, every 4h at :13 past
    - cron: '18 11 * * *'       # website-health, daily 07:18 EDT
    - cron: '40 11 * * *'       # pipeline-health, daily 07:40 EDT
    - cron: '54 9 * * *'        # data-quality, daily 05:54 EDT
    - cron: '0 12 1,15 * *'     # ssl-dns-check, biweekly 08:00 EDT
  workflow_dispatch:
    inputs:
      check:
        description: 'Run a specific check or all'
        type: choice
        options: [all, backend, website, pipelines, data-quality, ssl-dns]
        default: all

permissions:
  contents: read

# Don't pile up if a previous run is still going.
concurrency:
  group: health-checks-${{ github.event.schedule || inputs.check || 'all' }}
  cancel-in-progress: false

env:
  PROD_BACKEND: https://zippy-forgiveness-production-0704.up.railway.app
  PROD_WEBSITE: https://heymeld.com
  RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  backend-health:
    name: Backend /readyz
    if: github.event_name == 'workflow_dispatch' && (inputs.check == 'all' || inputs.check == 'backend') || github.event.schedule == '13 */4 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout (for scripts/file_linear_alert.py)
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Hit /readyz
        id: check
        run: |
          set +e
          curl -sf -m 15 "${PROD_BACKEND}/readyz" >/dev/null
          CODE=$?
          set -e
          if [ "$CODE" != "0" ]; then
            echo "::warning title=Backend /readyz failed::curl exit code $CODE"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "exit_code=$CODE" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute alert metadata
        id: meta
        if: steps.check.outputs.ok == 'false'
        run: echo "now=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"

      - name: File or update P0 Linear issue
        if: steps.check.outputs.ok == 'false'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          BODY="Production backend /readyz failed at ${{ steps.meta.outputs.now }}.

          curl exit code: ${{ steps.check.outputs.exit_code }}
          Endpoint: ${PROD_BACKEND}/readyz
          Run: ${RUN_URL}

          Where to look:
          - Railway dashboard for service zippy-forgiveness-production-0704
          - Sentry for new exception spikes
          - Recent merges to main (compare with deploy_sha at /ops/status)

          Filed by .github/workflows/health-checks.yml. The daily HITL digest will surface this until resolved."
          python3 scripts/file_linear_alert.py 1 "Backend /readyz failed" "$BODY"

  website-health:
    name: Website 200
    if: github.event_name == 'workflow_dispatch' && (inputs.check == 'all' || inputs.check == 'website') || github.event.schedule == '18 11 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Hit heymeld.com
        id: check
        run: |
          set +e
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 15 "${PROD_WEBSITE}/")
          set -e
          if [ "$CODE" != "200" ]; then
            echo "::warning title=Website check failed::heymeld.com returned HTTP $CODE"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "code=$CODE" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute alert metadata
        id: meta
        if: steps.check.outputs.ok == 'false'
        run: echo "now=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"

      - name: File or update P1 Linear issue
        if: steps.check.outputs.ok == 'false'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          BODY="heymeld.com returned HTTP ${{ steps.check.outputs.code }} at ${{ steps.meta.outputs.now }}.

          Run: ${RUN_URL}

          Where to look:
          - Cloudflare Pages dashboard for the site deployment
          - DNS resolution for heymeld.com (apex A record)
          - Cloudflare incident status

          Filed by .github/workflows/health-checks.yml."
          python3 scripts/file_linear_alert.py 2 "Website heymeld.com returned non-200" "$BODY"

  pipeline-health:
    name: ML pipeline_freshness
    if: github.event_name == 'workflow_dispatch' && (inputs.check == 'all' || inputs.check == 'pipelines') || github.event.schedule == '40 11 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Read /ops/status
        id: check
        run: |
          set +e
          BODY=$(curl -sf -m 15 "${PROD_BACKEND}/ops/status")
          CODE=$?
          set -e
          if [ "$CODE" != "0" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=ops_status_unreachable" >> "$GITHUB_OUTPUT"
            echo "details=curl exit $CODE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Look for any pipeline_freshness field that is null OR older than 36h.
          STALE=$(echo "$BODY" | python3 -c '
          import json, sys, datetime
          d = json.loads(sys.stdin.read())
          fresh = d.get("pipeline_freshness", {}) or {}
          now = datetime.datetime.now(datetime.timezone.utc)
          stale = []
          for k, v in fresh.items():
              if v is None:
                  stale.append(k + "=null")
                  continue
              try:
                  ts = datetime.datetime.fromisoformat(v.replace("Z", "+00:00"))
                  age_h = (now - ts).total_seconds() / 3600
                  if age_h > 36:
                      stale.append(f"{k}={age_h:.1f}h_old")
              except Exception:
                  stale.append(k + "=unparseable")
          print(",".join(stale))
          ')
          if [ -n "$STALE" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=stale_pipelines" >> "$GITHUB_OUTPUT"
            echo "details=$STALE" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute alert metadata
        id: meta
        if: steps.check.outputs.ok == 'false'
        run: echo "now=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"

      - name: File or update P1 Linear issue
        if: steps.check.outputs.ok == 'false'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          BODY="ML pipeline freshness check failed at ${{ steps.meta.outputs.now }}.

          Reason: ${{ steps.check.outputs.reason }}
          Details: ${{ steps.check.outputs.details }}
          Run: ${RUN_URL}

          MEL-39 is the long-running tracker for this symptom. If it is still open this comment lands there. If it has been resolved and the issue is back, a fresh issue gets created."
          # Dedup against MEL-39 (titled "Synth drift check...") AND any future
          # successor issue whose title might be one of the alternatives below.
          # Patterns are tried in order; first match wins.
          python3 scripts/file_linear_alert.py 2 \
            "ML pipeline_freshness stale or null" \
            "$BODY" \
            "synth drift,ml pipeline_freshness,pipeline_freshness"

  data-quality:
    name: Per-source data freshness
    if: github.event_name == 'workflow_dispatch' && (inputs.check == 'all' || inputs.check == 'data-quality') || github.event.schedule == '54 9 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Read /ops/ml/data-quality
        id: check
        run: |
          set +e
          BODY=$(curl -sf -m 15 "${PROD_BACKEND}/ops/ml/data-quality")
          CODE=$?
          set -e
          if [ "$CODE" != "0" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=endpoint_unreachable" >> "$GITHUB_OUTPUT"
            echo "details=curl exit $CODE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # P3 if a CONNECTED source has gone stale (last_ingest > 3 days).
          # We don't alert on never-ingested sources (null last_ingest); those
          # are users-not-yet-onboarded, not failures.
          STALE=$(echo "$BODY" | python3 -c '
          import json, sys
          d = json.loads(sys.stdin.read())
          stale = []
          for src, info in (d.get("sources") or {}).items():
              if info.get("last_ingest") is None:
                  continue
              ds = info.get("days_stale")
              if isinstance(ds, (int, float)) and ds > 3:
                  stale.append(f"{src}={ds}d")
          print(",".join(stale))
          ')
          if [ -n "$STALE" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=stale_source" >> "$GITHUB_OUTPUT"
            echo "details=$STALE" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute alert metadata
        id: meta
        if: steps.check.outputs.ok == 'false'
        run: echo "now=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"

      - name: File or update P3 Linear issue
        if: steps.check.outputs.ok == 'false'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          BODY="A connected health-data source has gone stale at ${{ steps.meta.outputs.now }}.

          Reason: ${{ steps.check.outputs.reason }}
          Details: ${{ steps.check.outputs.details }}
          Run: ${RUN_URL}

          Where to look:
          - Oura: OAuth token validity (refresh may have failed)
          - Garmin / Peloton / Apple Health: sync job logs in Railway"
          python3 scripts/file_linear_alert.py 3 "Health-data source stale" "$BODY"

  ssl-dns-check:
    name: SSL cert + DNS records
    if: github.event_name == 'workflow_dispatch' && (inputs.check == 'all' || inputs.check == 'ssl-dns') || github.event.schedule == '0 12 1,15 * *'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Check SSL cert expiry
        id: ssl
        run: |
          set +e
          EXPIRY=$(echo | openssl s_client -servername heymeld.com -connect heymeld.com:443 2>/dev/null \
            | openssl x509 -noout -enddate 2>/dev/null \
            | sed 's/notAfter=//')
          if [ -z "$EXPIRY" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=cert_unreadable" >> "$GITHUB_OUTPUT"
            echo "days_left=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          EXPIRY_TS=$(date -u -d "$EXPIRY" +%s 2>/dev/null || echo 0)
          NOW_TS=$(date -u +%s)
          DAYS_LEFT=$(( (EXPIRY_TS - NOW_TS) / 86400 ))
          echo "days_left=$DAYS_LEFT" >> "$GITHUB_OUTPUT"
          if [ "$DAYS_LEFT" -lt 30 ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=cert_expiring" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check DNS records (SPF, DKIM, DMARC, A/CNAME)
        id: dns
        run: |
          set +e
          MISSING=""
          SPF=$(dig +short TXT heymeld.com | grep -i 'v=spf1' || true)
          [ -z "$SPF" ] && MISSING="${MISSING}spf,"
          DMARC=$(dig +short TXT _dmarc.heymeld.com | grep -i 'v=DMARC1' || true)
          [ -z "$DMARC" ] && MISSING="${MISSING}dmarc,"
          DKIM=$(dig +short TXT google._domainkey.heymeld.com | grep -i 'v=DKIM1' || true)
          [ -z "$DKIM" ] && MISSING="${MISSING}dkim,"
          APEX=$(dig +short A heymeld.com)
          [ -z "$APEX" ] && MISSING="${MISSING}apex_record,"
          MISSING="${MISSING%,}"
          if [ -n "$MISSING" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "missing=$MISSING" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Roll up status + priority
        id: rollup
        run: |
          if [ "${{ steps.ssl.outputs.ok }}" = "false" ] || [ "${{ steps.dns.outputs.ok }}" = "false" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            # P2 if cert is expiring or apex_record is missing; P3 otherwise.
            if [ "${{ steps.ssl.outputs.reason }}" = "cert_expiring" ] \
              || [ "${{ steps.ssl.outputs.reason }}" = "cert_unreadable" ] \
              || echo "${{ steps.dns.outputs.missing }}" | grep -q "apex_record"; then
              echo "priority=2" >> "$GITHUB_OUTPUT"
            else
              echo "priority=3" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute alert metadata
        id: meta
        if: steps.rollup.outputs.ok == 'false'
        run: echo "now=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"

      - name: File or update Linear issue
        if: steps.rollup.outputs.ok == 'false'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          BODY="heymeld.com SSL or DNS check flagged at ${{ steps.meta.outputs.now }}.

          SSL: ok=${{ steps.ssl.outputs.ok }}, days_left=${{ steps.ssl.outputs.days_left }}, reason=${{ steps.ssl.outputs.reason }}
          DNS: ok=${{ steps.dns.outputs.ok }}, missing=${{ steps.dns.outputs.missing }}
          Run: ${RUN_URL}

          Action hints:
          - Cert: check Cloudflare SSL settings
          - DNS missing: re-add the record at the registrar (records: SPF / DKIM via google._domainkey / DMARC at _dmarc / apex A)"
          python3 scripts/file_linear_alert.py ${{ steps.rollup.outputs.priority }} \
            "SSL/DNS check flagged for heymeld.com" \
            "$BODY"
