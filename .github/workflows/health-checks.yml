name: Health Checks (Cron)

# Replaces the following Claude Code scheduled tasks, which were running on
# Brock's PC and required the machine to be awake:
#   - meld-backend-health   (every 4h, /readyz)
#   - meld-website-health   (daily,    heymeld.com 200)
#   - meld-pipeline-health  (daily,    /ops/status pipeline_freshness)
#   - meld-data-quality     (daily,    /ops/ml/data-quality per-source freshness)
#   - meld-ssl-dns-check    (biweekly, cert expiry + DNS records)
#
# Architecture: each cron tick runs a pure shell check. Claude is invoked
# ONLY on failure to file or update a Linear issue (cost is $0 on healthy
# days). Linear writes happen via the existing claude-code-action MCP path,
# so no new secret is required beyond the ANTHROPIC_API_KEY already in use
# by auto-fix-dryrun.yml.
#
# Dedup: each failure-handler prompt asks Claude to first search Linear for
# an open issue with the same title in the last 24h, comment if it exists,
# create only if not. So a sustained outage produces one issue and a chain
# of comments, not N duplicates.
#
# Crons are in UTC (GitHub Actions does not honor local timezone). Times
# below approximate the East Coast morning routine the prior scheduled
# tasks ran on.

on:
  schedule:
    - cron: '13 */4 * * *'      # backend-health, every 4h at :13 past
    - cron: '18 11 * * *'       # website-health, daily 07:18 EDT / 06:18 EST
    - cron: '40 11 * * *'       # pipeline-health, daily 07:40 EDT
    - cron: '54 9 * * *'        # data-quality, daily 05:54 EDT
    - cron: '0 12 1,15 * *'     # ssl-dns-check, biweekly 08:00 EDT on 1st and 15th
  workflow_dispatch:
    inputs:
      check:
        description: 'Run a specific check or all'
        type: choice
        options: [all, backend, website, pipelines, data-quality, ssl-dns]
        default: all

permissions:
  contents: read
  issues: write
  pull-requests: read

# Don't pile up if a previous run is still going.
concurrency:
  group: health-checks-${{ github.event.schedule || inputs.check || 'all' }}
  cancel-in-progress: false

env:
  PROD_BACKEND: https://zippy-forgiveness-production-0704.up.railway.app
  PROD_WEBSITE: https://heymeld.com
  RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  backend-health:
    name: Backend /readyz
    if: github.event_name == 'workflow_dispatch' && (inputs.check == 'all' || inputs.check == 'backend') || github.event.schedule == '13 */4 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /readyz
        id: check
        run: |
          set +e
          BODY=$(curl -sf -m 15 "${PROD_BACKEND}/readyz")
          CODE=$?
          set -e
          if [ "$CODE" != "0" ]; then
            echo "::warning title=Backend /readyz failed::curl exit code $CODE"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "exit_code=$CODE" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: File or update P0 Linear issue
        if: steps.check.outputs.ok == 'false'
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 4
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-haiku-4-5
            --max-turns 5
            --allowed-tools "mcp__linear__list_issues,mcp__linear__save_issue,mcp__linear__list_comments,mcp__linear__save_comment"
          prompt: |
            Production backend `/readyz` failed at $(date -u +%FT%TZ). curl exit code: ${{ steps.check.outputs.exit_code }}. Run URL: ${{ env.RUN_URL }}.

            Steps:
            1. List open issues in Linear team Meldhealth created in the last 24h with title containing "Backend /readyz failed".
            2. If one exists, append a comment: "Still failing at $(date -u +%FT%TZ). Run: ${{ env.RUN_URL }}."
            3. If none exists, create one:
               - team: Meldhealth
               - priority: 1 (Urgent)
               - title: "Backend /readyz failed"
               - labels: ["source/routine", "type/maintenance"]
               - description: "## What\nProduction backend health check (\`${{ env.PROD_BACKEND }}/readyz\`) returned non-200 starting $(date -u +%FT%TZ).\n\n## Where to look\n- Railway dashboard for service zippy-forgiveness-production-0704\n- Sentry for any new exception spikes\n- Recent merges to main (compare with deploy_sha at /ops/status)\n\n## Source\nFiled by `.github/workflows/health-checks.yml` cron run at ${{ env.RUN_URL }}. The daily HITL digest will surface this until resolved."

            No em dashes in any output. Use commas, colons, parens.
            Output the resulting Linear issue URL.

  website-health:
    name: Website 200
    if: github.event_name == 'workflow_dispatch' && (inputs.check == 'all' || inputs.check == 'website') || github.event.schedule == '18 11 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit heymeld.com
        id: check
        run: |
          set +e
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 15 "${PROD_WEBSITE}/")
          set -e
          if [ "$CODE" != "200" ]; then
            echo "::warning title=Website check failed::heymeld.com returned HTTP $CODE"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "code=$CODE" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: File or update P1 Linear issue
        if: steps.check.outputs.ok == 'false'
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 4
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-haiku-4-5
            --max-turns 5
            --allowed-tools "mcp__linear__list_issues,mcp__linear__save_issue,mcp__linear__list_comments,mcp__linear__save_comment"
          prompt: |
            heymeld.com returned HTTP ${{ steps.check.outputs.code }} at $(date -u +%FT%TZ). Run URL: ${{ env.RUN_URL }}.

            Steps:
            1. Search Linear team Meldhealth for open issues from the last 24h with title containing "Website heymeld.com returned non-200".
            2. If one exists, comment "Still failing, HTTP ${{ steps.check.outputs.code }} at $(date -u +%FT%TZ). Run: ${{ env.RUN_URL }}."
            3. Else create:
               - team: Meldhealth
               - priority: 2 (High)
               - title: "Website heymeld.com returned non-200"
               - labels: ["source/routine", "type/maintenance"]
               - description: brief context, mention Cloudflare Pages dashboard, link the run URL.

            No em dashes. Output the issue URL.

  pipeline-health:
    name: ML pipeline_freshness
    if: github.event_name == 'workflow_dispatch' && (inputs.check == 'all' || inputs.check == 'pipelines') || github.event.schedule == '40 11 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Read /ops/status
        id: check
        run: |
          set +e
          BODY=$(curl -sf -m 15 "${PROD_BACKEND}/ops/status")
          CODE=$?
          set -e
          if [ "$CODE" != "0" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=ops_status_unreachable" >> "$GITHUB_OUTPUT"
            echo "details=curl exit $CODE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Look for any pipeline_freshness field that is null OR older than 36h.
          STALE=$(echo "$BODY" | python3 -c '
          import json, sys, datetime
          d = json.loads(sys.stdin.read())
          fresh = d.get("pipeline_freshness", {}) or {}
          now = datetime.datetime.now(datetime.timezone.utc)
          stale = []
          for k, v in fresh.items():
              if v is None:
                  stale.append(k + "=null")
                  continue
              try:
                  ts = datetime.datetime.fromisoformat(v.replace("Z", "+00:00"))
                  age_h = (now - ts).total_seconds() / 3600
                  if age_h > 36:
                      stale.append(f"{k}={age_h:.1f}h_old")
              except Exception:
                  stale.append(k + "=unparseable")
          print(",".join(stale))
          ')
          if [ -n "$STALE" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=stale_pipelines" >> "$GITHUB_OUTPUT"
            echo "details=$STALE" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: File or update P1 Linear issue
        if: steps.check.outputs.ok == 'false'
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 4
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-haiku-4-5
            --max-turns 5
            --allowed-tools "mcp__linear__list_issues,mcp__linear__save_issue,mcp__linear__list_comments,mcp__linear__save_comment"
          prompt: |
            ML pipeline freshness check failed at $(date -u +%FT%TZ). Reason: ${{ steps.check.outputs.reason }}. Details: ${{ steps.check.outputs.details }}. Run: ${{ env.RUN_URL }}.

            Steps:
            1. CRITICAL: search Linear team Meldhealth for OPEN (not Done, not Canceled) issues with "pipeline_freshness" or "synth drift" in the title. MEL-39 is the long-running tracker for this exact symptom. If MEL-39 or any similar open issue exists, comment on it: "Still failing as of $(date -u +%FT%TZ). Details: ${{ steps.check.outputs.details }}. Run: ${{ env.RUN_URL }}." DO NOT create a new issue.
            2. Only if no such open issue exists, create one:
               - team: Meldhealth
               - priority: 2 (High)
               - title: "ML pipeline_freshness stale or null"
               - labels: ["source/routine"]
               - description: include the details list and link the run URL.

            No em dashes. Output the issue URL.

  data-quality:
    name: Per-source data freshness
    if: github.event_name == 'workflow_dispatch' && (inputs.check == 'all' || inputs.check == 'data-quality') || github.event.schedule == '54 9 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Read /ops/ml/data-quality
        id: check
        run: |
          set +e
          BODY=$(curl -sf -m 15 "${PROD_BACKEND}/ops/ml/data-quality")
          CODE=$?
          set -e
          if [ "$CODE" != "0" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=endpoint_unreachable" >> "$GITHUB_OUTPUT"
            echo "details=curl exit $CODE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # P2 if a CONNECTED source has gone stale (last_ingest > 3 days).
          # We don't alert on never-ingested sources (null last_ingest); those
          # are users-not-yet-onboarded, not failures.
          STALE=$(echo "$BODY" | python3 -c '
          import json, sys
          d = json.loads(sys.stdin.read())
          stale = []
          for src, info in (d.get("sources") or {}).items():
              if info.get("last_ingest") is None:
                  continue
              ds = info.get("days_stale")
              if isinstance(ds, (int, float)) and ds > 3:
                  stale.append(f"{src}={ds}d")
          print(",".join(stale))
          ')
          if [ -n "$STALE" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=stale_source" >> "$GITHUB_OUTPUT"
            echo "details=$STALE" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: File or update P2 Linear issue
        if: steps.check.outputs.ok == 'false'
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 4
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-haiku-4-5
            --max-turns 5
            --allowed-tools "mcp__linear__list_issues,mcp__linear__save_issue,mcp__linear__list_comments,mcp__linear__save_comment"
          prompt: |
            Connected health-data source has gone stale at $(date -u +%FT%TZ). Reason: ${{ steps.check.outputs.reason }}. Details: ${{ steps.check.outputs.details }}. Run: ${{ env.RUN_URL }}.

            Steps:
            1. Look in Linear team Meldhealth for an open issue from the last 24h with title "Health-data source stale". If found, append a comment with the latest details + run URL.
            2. Else create:
               - team: Meldhealth
               - priority: 3 (Normal)
               - title: "Health-data source stale"
               - labels: ["source/routine"]
               - description: detail which sources are stale, suggest checking OAuth token validity (Oura) or sync job logs (Garmin/Peloton/Apple Health).

            No em dashes. Output the issue URL.

  ssl-dns-check:
    name: SSL cert + DNS records
    if: github.event_name == 'workflow_dispatch' && (inputs.check == 'all' || inputs.check == 'ssl-dns') || github.event.schedule == '0 12 1,15 * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check SSL cert expiry
        id: ssl
        run: |
          set +e
          # openssl s_client returns the cert; pipe through openssl x509 to get expiry.
          EXPIRY=$(echo | openssl s_client -servername heymeld.com -connect heymeld.com:443 2>/dev/null \
            | openssl x509 -noout -enddate 2>/dev/null \
            | sed 's/notAfter=//')
          if [ -z "$EXPIRY" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=cert_unreadable" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Days until expiry
          EXPIRY_TS=$(date -u -d "$EXPIRY" +%s 2>/dev/null || echo 0)
          NOW_TS=$(date -u +%s)
          DAYS_LEFT=$(( (EXPIRY_TS - NOW_TS) / 86400 ))
          echo "days_left=$DAYS_LEFT" >> "$GITHUB_OUTPUT"
          if [ "$DAYS_LEFT" -lt 30 ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=cert_expiring" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check DNS records (SPF, DKIM, DMARC, A/CNAME)
        id: dns
        run: |
          set +e
          MISSING=""
          # SPF
          SPF=$(dig +short TXT heymeld.com | grep -i 'v=spf1' || true)
          [ -z "$SPF" ] && MISSING="${MISSING}spf,"
          # DMARC
          DMARC=$(dig +short TXT _dmarc.heymeld.com | grep -i 'v=DMARC1' || true)
          [ -z "$DMARC" ] && MISSING="${MISSING}dmarc,"
          # DKIM (Google Workspace default selector)
          DKIM=$(dig +short TXT google._domainkey.heymeld.com | grep -i 'v=DKIM1' || true)
          [ -z "$DKIM" ] && MISSING="${MISSING}dkim,"
          # A or CNAME for apex
          APEX=$(dig +short A heymeld.com)
          [ -z "$APEX" ] && MISSING="${MISSING}apex_record,"
          MISSING="${MISSING%,}"
          if [ -n "$MISSING" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "missing=$MISSING" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Roll up status
        id: rollup
        run: |
          if [ "${{ steps.ssl.outputs.ok }}" = "false" ] || [ "${{ steps.dns.outputs.ok }}" = "false" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: File or update P1 Linear issue
        if: steps.rollup.outputs.ok == 'false'
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 4
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-haiku-4-5
            --max-turns 5
            --allowed-tools "mcp__linear__list_issues,mcp__linear__save_issue,mcp__linear__list_comments,mcp__linear__save_comment"
          prompt: |
            heymeld.com SSL or DNS check flagged at $(date -u +%FT%TZ).

            SSL check: ok=${{ steps.ssl.outputs.ok }}, days_left=${{ steps.ssl.outputs.days_left }}, reason=${{ steps.ssl.outputs.reason }}.
            DNS check: ok=${{ steps.dns.outputs.ok }}, missing=${{ steps.dns.outputs.missing }}.

            Run: ${{ env.RUN_URL }}.

            Steps:
            1. Search Linear team Meldhealth for open issues from the last 14 days with title containing "SSL/DNS check". If found, append a comment with the new details.
            2. Else create:
               - team: Meldhealth
               - priority: 2 (High) if cert_expiring or apex_record missing; 3 (Normal) otherwise.
               - title: "SSL/DNS check flagged for heymeld.com"
               - labels: ["source/routine", "type/maintenance"]
               - description: detail the specific failures, include action hints (cert: check Cloudflare; DNS missing: re-add the record at the registrar).

            No em dashes. Output the issue URL.
