# Dependabot: automated dependency vulnerability scanning.
# Creates PRs for security updates across all three ecosystems.

version: 2
updates:
  # Python backend (pip/uv)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "type/maintenance"
      - "source/routine"
    commit-message:
      prefix: "deps(backend):"

  # Astro website (npm)
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "type/maintenance"
      - "source/routine"
    commit-message:
      prefix: "deps(website):"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "type/maintenance"
    commit-message:
      prefix: "deps(actions):"
