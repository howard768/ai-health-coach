# Dependabot: automated dependency vulnerability scanning.
# Creates PRs for security updates across all three ecosystems.

version: 2
updates:
  # Python backend (pip/uv)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "type/maintenance"
      - "source/routine"
    commit-message:
      prefix: "deps(backend):"

  # Astro website (npm)
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "type/maintenance"
      - "source/routine"
    commit-message:
      prefix: "deps(website):"
    # TODO: remove once @astrojs/check ships a release with peer typescript ^6
    # Track: https://github.com/withastro/language-tools (check @astrojs/check peerDependencies)
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "type/maintenance"
    commit-message:
      prefix: "deps(actions):"

  # Backend Dockerfile (Python base + uv pin)
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "type/maintenance"
    commit-message:
      prefix: "deps(docker):"
