name: Meld
options:
  bundleIdPrefix: com.heymeld
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 2
    DEVELOPMENT_TEAM: "8HA7S8AFF7"
  configs:
    Debug:
      # Debug builds on a physical device talk to the Mac over Tailscale.
      # Works anywhere (home, coffee shop, airport) as long as Tailscale is on.
      # Override per developer by setting API_BASE_URL in the scheme env.
      API_BASE_URL: "http:/$()/100.104.76.64:8000/api"
    Release:
      # TestFlight + App Store builds hit Railway.
      API_BASE_URL: "https:/$()/zippy-forgiveness-production-0704.up.railway.app/api"

targets:
  Meld:
    type: application
    platform: iOS
    sources:
      - path: Meld
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Meld/Resources
      - path: Meld/Preview Content
    # IMPORTANT: entitlements generated from properties. Using just `path:` lets
    # xcodegen clobber the file (see feedback_ci_gotchas.md). Declaring properties
    # here means xcodegen always regenerates the file with the right keys.
    entitlements:
      path: Meld/Meld.entitlements
      properties:
        aps-environment: development
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
    settings:
      base:
        INFOPLIST_FILE: Meld/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.heymeld.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Meld/Meld.entitlements
        # iPhone only (1). If set to "1,2" we'd need to declare all four
        # iPad orientations in Info.plist for multitasking support.
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: MeldNotificationServiceExtension
      - package: PhosphorSwift
      - package: SwiftUI-Shimmer
        product: Shimmer
      - package: Popups
        product: MijickPopups
      - package: SwiftGlass
      - package: SwiftUIX
      - package: swiftui-introspect
        product: SwiftUIIntrospect
      - package: TelemetryDeck
    info:
      path: Meld/Info.plist
      properties:
        CFBundleDisplayName: Meld
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Declare that Meld only uses encryption within Apple's operating system
        # (TLS, HealthKit, Sign in with Apple). This skips the App Store Connect
        # "App Encryption Documentation" prompt on every TestFlight upload.
        ITSAppUsesNonExemptEncryption: false
        API_BASE_URL: $(API_BASE_URL)
        UIAppFonts:
          - Roboto-Thin.ttf
          - Roboto-Light.ttf
          - Roboto-Regular.ttf
          - Roboto-Medium.ttf
          - Roboto-Bold.ttf
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Automatic
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - meld
            CFBundleURLName: com.heymeld.app.deeplink
        NSCameraUsageDescription: Meld uses your camera to take photos of food and scan barcodes.
        NSSpeechRecognitionUsageDescription: Meld uses speech recognition to log food by voice.
        NSMicrophoneUsageDescription: Meld needs microphone access for voice food logging.
        NSHealthShareUsageDescription: Meld reads your sleep, activity, and heart rate to provide personalized coaching.
        NSHealthUpdateUsageDescription: Meld logs meals and workouts to keep your health records in sync.
        NSAppTransportSecurity:
          # NSAllowsArbitraryLoads alone covers all HTTP including Tailscale's
          # CGNAT range (100.64.0.0/10). Don't add NSAllowsLocalNetworking —
          # when both are set, iOS ignores NSAllowsArbitraryLoads and only
          # allows RFC1918 ranges (10/172.16/192.168), which blocks Tailscale.
          NSAllowsArbitraryLoads: true

  MeldNotificationServiceExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: MeldNotificationServiceExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heymeld.app.notification-service
        INFOPLIST_FILE: MeldNotificationServiceExtension/Info.plist
    info:
      path: MeldNotificationServiceExtension/Info.plist
      properties:
        CFBundleDisplayName: Meld Notification Service
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService

  MeldTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MeldTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Meld

  MeldSnapshotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MeldSnapshotTests
        # __Snapshots__ directories hold reference PNGs that
        # swift-snapshot-testing reads from disk at test time. They must
        # not be bundled as test resources — xcodegen's default flattens
        # them into the .xctest root, which collides when two subdirs
        # both contain e.g. fullWidth.1.png and breaks the build.
        excludes:
          - "**/__Snapshots__/**"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Meld
      - package: SnapshotTesting

  MeldUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MeldUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Meld

packages:
  PhosphorSwift:
    url: https://github.com/phosphor-icons/swift
    branch: main
  SwiftUI-Shimmer:
    url: https://github.com/markiv/SwiftUI-Shimmer
    from: "1.5.1"
  Popups:
    url: https://github.com/Mijick/Popups
    from: "4.0.5"
  SwiftGlass:
    url: https://github.com/1998code/SwiftGlass
    from: "26.0.1"
  SwiftUIX:
    url: https://github.com/SwiftUIX/SwiftUIX
    branch: master
  swiftui-introspect:
    url: https://github.com/siteline/swiftui-introspect
    from: "26.0.1"
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: "2.12.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

schemes:
  Meld:
    build:
      targets:
        Meld: all
    run:
      config: Debug
    test:
      targets:
        - MeldTests
        - MeldSnapshotTests
        - MeldUITests
