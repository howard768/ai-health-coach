<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-primary); font-family: var(--font-family); display: flex; gap: 16px; align-items: center; }
  .pane { flex: 1; border-radius: var(--r-lg); padding: 20px; display: flex; gap: 16px; align-items: center; }
  .mascot { width: 72px; height: 72px; background: #faf0da; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex: none; }
  .mascot img { width: 48px; }
  .label { font-size: 11px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px; }
  .hex { font-family: ui-monospace, monospace; font-size: 11px; color: var(--text-secondary); }
  .name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
</style></head>
<body>
  <div class="pane" style="background:#faf0da">
    <div class="mascot"><img src="../assets/mascot.svg" alt=""></div>
    <div>
      <div class="label">Warm amber</div>
      <div class="name">Mascot body</div>
      <div class="hex">#e5a84b · #6b4b1a eyes · #faf0da tint</div>
    </div>
  </div>
</body></html>
