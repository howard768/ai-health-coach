<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--bg-primary); font-family: var(--font-family); display: flex; gap: 24px; align-items: flex-end; flex-wrap: wrap; }
  .item { text-align: center; }
  .sq { background: var(--purple-100); border: 1px solid var(--purple-200); display: flex; align-items: center; justify-content: center; color: var(--purple-600); font-weight: 500; font-size: 12px; }
  .lbl { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-top: 8px; }
  .spec { font-family: ui-monospace, monospace; font-size: 10px; color: var(--text-secondary); }
</style></head>
<body>
  <div class="item"><div class="sq" style="width:48px;height:48px;border-radius:var(--r-xs)">xs</div><div class="lbl">Badge</div><div class="spec">4px</div></div>
  <div class="item"><div class="sq" style="width:56px;height:56px;border-radius:var(--r-sm)">sm</div><div class="lbl">Chip</div><div class="spec">8px</div></div>
  <div class="item"><div class="sq" style="width:64px;height:64px;border-radius:var(--r-md)">md</div><div class="lbl">Input</div><div class="spec">12px</div></div>
  <div class="item"><div class="sq" style="width:72px;height:72px;border-radius:var(--r-lg)">lg</div><div class="lbl">Metric card</div><div class="spec">16px</div></div>
  <div class="item"><div class="sq" style="width:80px;height:80px;border-radius:var(--r-xl)">xl</div><div class="lbl">Insight card</div><div class="spec">20px</div></div>
  <div class="item"><div class="sq" style="width:88px;height:88px;border-radius:var(--r-2xl)">2xl</div><div class="lbl">Modal</div><div class="spec">28px</div></div>
  <div class="item"><div class="sq" style="width:64px;height:64px;border-radius:var(--r-full)">∞</div><div class="lbl">Pill</div><div class="spec">full</div></div>
</body></html>
