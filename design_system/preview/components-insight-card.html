<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--bg-primary); font-family: var(--font-family); display: flex; gap: 16px; align-items: flex-start; }
  .insight { background: var(--purple-100); border-radius: var(--r-xl); padding: 20px; display: flex; gap: 14px; flex: 1; max-width: 500px; }
  .mascot { width: 48px; height: 48px; background: var(--amber-tint); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex: none; }
  .mascot img { width: 32px; }
  .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--purple-600); margin-bottom: 4px; }
  .title { font-weight: 500; font-size: 16px; color: var(--text-primary); margin-bottom: 6px; line-height: 1.35; }
  .body { font-size: 14px; font-weight: 300; color: var(--text-secondary); line-height: 1.5; }
  .cite { font-size: 12px; color: var(--text-tertiary); margin-top: 10px; font-style: italic; }
</style></head>
<body>
  <div class="insight">
    <div class="mascot"><img src="../assets/mascot.svg" alt=""></div>
    <div>
      <div class="eyebrow">Pattern found</div>
      <div class="title">Your deep sleep goes up 22% on days you eat more protein.</div>
      <div class="body">Three weeks of Oura sleep data and your food log line up on this one. Try front-loading protein at lunch this week.</div>
      <div class="cite">From your Oura sleep + food log · 21 days</div>
    </div>
  </div>
</body></html>
