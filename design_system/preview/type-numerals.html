<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-primary); font-family: var(--font-family); display: flex; gap: 32px; align-items: flex-end; }
  .val { text-align: center; }
  .lbl { font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }
  .num { color: var(--text-primary); }
  .unit { font-size: 12px; color: var(--text-secondary); font-weight: 400; margin-left: 2px; }
  .sub { font-size: 12px; color: #178066; margin-top: 4px; }
</style></head>
<body>
  <div class="val">
    <div class="lbl">Metric XL · 48 Thin</div>
    <span class="num" style="font-weight:100;font-size:48px;letter-spacing:-0.02em">91</span><span class="unit">%</span>
    <div class="sub">↑ 14% vs baseline</div>
  </div>
  <div class="val">
    <div class="lbl">Metric LG · 32 Light</div>
    <span class="num" style="font-weight:300;font-size:32px">68</span><span class="unit">ms</span>
    <div class="sub">Stable this week</div>
  </div>
  <div class="val">
    <div class="lbl">Caption · 12 Reg</div>
    <div style="font-weight:400;font-size:12px;color:var(--text-tertiary)">Tue, Apr 16 · synced 2m ago</div>
  </div>
  <div class="val">
    <div class="lbl">Label · 11 Med UC</div>
    <div style="font-weight:500;font-size:11px;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-tertiary)">Recovery Readiness</div>
  </div>
</body></html>
