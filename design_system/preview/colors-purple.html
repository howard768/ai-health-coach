<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-primary); }
  .swatch { border-radius: var(--r-md); padding: 16px; display: flex; flex-direction: column; justify-content: space-between; height: 84px; font-family: var(--font-family); font-size: 11px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; box-shadow: var(--shadow-low); }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .hex { font-size: 10px; opacity: 0.8; text-transform: none; letter-spacing: 0; font-family: ui-monospace, monospace; font-weight: 400; }
  .name { font-weight: 500; }
</style></head>
<body>
<div class="grid">
  <div class="swatch" style="background:#faf7ff;color:#121217"><span class="name">50</span><span class="hex">#faf7ff</span></div>
  <div class="swatch" style="background:#f2edfc;color:#121217"><span class="name">100</span><span class="hex">#f2edfc</span></div>
  <div class="swatch" style="background:#ded6f2;color:#121217"><span class="name">200</span><span class="hex">#ded6f2</span></div>
  <div class="swatch" style="background:#b8a8e3;color:#fff"><span class="name">300</span><span class="hex">#b8a8e3</span></div>
  <div class="swatch" style="background:#8c75cc;color:#fff"><span class="name">400</span><span class="hex">#8c75cc</span></div>
  <div class="swatch" style="background:#6b52b8;color:#fff"><span class="name">500</span><span class="hex">#6b52b8</span></div>
  <div class="swatch" style="background:#5438a6;color:#fff"><span class="name">600 ★</span><span class="hex">#5438a6</span></div>
</div>
</body></html>
