<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--bg-primary); font-family: var(--font-family); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn { font-family: inherit; border: none; cursor: pointer; transition: all var(--dur-base) var(--ease-spring); display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary { background: var(--purple-600); color: #fff; padding: 14px 24px; border-radius: var(--r-md); font-weight: 500; font-size: 16px; box-shadow: 0 2px 8px rgba(84,56,166,0.25); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-high); background: var(--purple-500); }
  .btn-secondary { background: transparent; color: var(--purple-600); border: 1.5px solid var(--purple-200); padding: 13px 22px; border-radius: var(--r-md); font-weight: 500; font-size: 16px; }
  .btn-secondary:hover { border-color: var(--purple-600); background: var(--purple-50); }
  .btn-ghost { background: transparent; color: var(--purple-600); padding: 12px 16px; border-radius: var(--r-md); font-weight: 500; font-size: 16px; }
  .btn-ghost:hover { background: var(--purple-100); }
  .btn-pill { background: var(--purple-100); color: var(--purple-600); padding: 8px 14px; border-radius: var(--r-full); font-size: 13px; font-weight: 500; }
  .btn-chip { background: var(--bg-secondary); color: var(--text-secondary); padding: 6px 12px; border-radius: var(--r-sm); font-size: 13px; font-weight: 500; }
  .btn-chip.active { background: var(--purple-500); color: #fff; }
  .btn-disabled { opacity: 0.5; cursor: not-allowed; background: var(--purple-600); color: #fff; padding: 14px 24px; border-radius: var(--r-md); font-weight: 500; font-size: 16px; }
</style></head>
<body>
  <button class="btn btn-primary">Connect Oura</button>
  <button class="btn btn-secondary">Skip for now</button>
  <button class="btn btn-ghost">Learn more →</button>
  <button class="btn btn-pill">Dismiss</button>
  <button class="btn btn-chip active">Sleep</button>
  <button class="btn btn-chip">Recovery</button>
  <button class="btn btn-chip">Nutrition</button>
  <button class="btn btn-disabled">Saving…</button>
</body></html>
