<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-primary); }
  .swatch { border-radius: var(--r-md); padding: 16px; display: flex; flex-direction: column; justify-content: space-between; height: 84px; font-family: var(--font-family); font-size: 11px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; box-shadow: var(--shadow-low); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .hex { font-size: 10px; opacity: 0.8; text-transform: none; letter-spacing: 0; font-family: ui-monospace, monospace; font-weight: 400; }
</style></head>
<body>
<div class="grid">
  <div class="swatch" style="background:#e5f7f0;color:#121217"><span>100</span><span class="hex">#e5f7f0</span></div>
  <div class="swatch" style="background:#baebdb;color:#121217"><span>200</span><span class="hex">#baebdb</span></div>
  <div class="swatch" style="background:#73d4ba;color:#121217"><span>300</span><span class="hex">#73d4ba</span></div>
  <div class="swatch" style="background:#219e80;color:#fff"><span>500 ★</span><span class="hex">#219e80</span></div>
  <div class="swatch" style="background:#178066;color:#fff"><span>600 txt</span><span class="hex">#178066</span></div>
</div>
</body></html>
