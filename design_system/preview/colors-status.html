<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-primary); font-family: var(--font-family); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .item { border-radius: var(--r-md); padding: 14px; height: 80px; display: flex; flex-direction: column; justify-content: space-between; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .name { font-size: 11px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; }
  .hex { font-family: ui-monospace, monospace; font-size: 10px; opacity: 0.7; }
</style></head>
<body>
<div class="grid">
  <div class="item" style="background:#e5f7f0;color:#178066"><div class="dot" style="background:#219e80"></div><div><div class="name">Success</div><div class="hex">#219e80</div></div></div>
  <div class="item" style="background:#fdf4e1;color:#8a5e0a"><div class="dot" style="background:#e5a626"></div><div><div class="name">Warning</div><div class="hex">#e5a626</div></div></div>
  <div class="item" style="background:#fbe5e5;color:#8a2424"><div class="dot" style="background:#d94040"></div><div><div class="name">Error</div><div class="hex">#d94040</div></div></div>
  <div class="item" style="background:#e5ecf7;color:#2a4f8a"><div class="dot" style="background:#4d80d9"></div><div><div class="name">Info</div><div class="hex">#4d80d9</div></div></div>
</div>
</body></html>
