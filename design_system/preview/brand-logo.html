<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: linear-gradient(180deg, #faf7ff 0%, #ffffff 60%); font-family: var(--font-family); }
  .wordmark { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .wordmark img { height: 40px; }
  .mark-row { display: flex; gap: 32px; align-items: center; padding: 16px 0; border-top: 1px solid var(--bg-tertiary); }
  .mark-row:last-child { border-bottom: 1px solid var(--bg-tertiary); }
  .lbl { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); width: 140px; flex: none; }
  .preview { display: flex; gap: 24px; align-items: center; }
</style></head>
<body>
  <div class="wordmark"><img src="../assets/logo.svg" alt="Meld"></div>
  <div class="mark-row">
    <div class="lbl">Favicon</div>
    <div class="preview">
      <img src="../assets/favicon.svg" width="32" height="32" alt="">
      <img src="../assets/favicon.svg" width="48" height="48" alt="">
      <img src="../assets/favicon.svg" width="64" height="64" alt="">
    </div>
  </div>
  <div class="mark-row">
    <div class="lbl">Mascot</div>
    <div class="preview">
      <img src="../assets/mascot.svg" width="40" height="40" alt="">
      <img src="../assets/mascot.svg" width="64" height="64" alt="">
      <img src="../assets/mascot.svg" width="96" height="96" alt="">
    </div>
  </div>
</body></html>
