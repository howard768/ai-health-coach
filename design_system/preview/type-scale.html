<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-primary); font-family: var(--font-family); }
  .row { display: flex; align-items: baseline; gap: 24px; padding: 10px 0; border-bottom: 1px dashed var(--bg-tertiary); }
  .row:last-child { border: none; }
  .spec { width: 140px; font-size: 11px; color: var(--text-tertiary); font-family: ui-monospace, monospace; flex: none; }
</style></head>
<body>
  <div class="row"><div class="spec">display · 40 Thin</div><div class="display">Your health, synthesized</div></div>
  <div class="row"><div class="spec">h1 · 28 Light</div><div class="h1">Good evening, Brock.</div></div>
  <div class="row"><div class="spec">h2 · 22 Regular</div><div class="h2">Today</div></div>
  <div class="row"><div class="spec">h3 · 18 Medium</div><div class="h3">Sleep Efficiency</div></div>
  <div class="row"><div class="spec">body · 16 Light</div><div>Your deep sleep improved when you added more protein at lunch.</div></div>
</body></html>
