appId: com.heymeld.app
name: "Dashboard — Real metric values load (not '--' or '0')"
---
- runFlow: ../helpers/auth_bypass.yaml

- tapOn:
    id: "tab-home"

# Wait for dashboard data to load (metric labels are uppercase)
- extendedWaitUntil:
    visible: "SLEEP EFFICIENCY"
    timeout: 10000

# Verify metric cards are visible with real values
- assertVisible: "SLEEP EFFICIENCY"
- assertVisible: "HRV STATUS"

# Screenshot for visual verification
- takeScreenshot: dashboard_data_loaded
