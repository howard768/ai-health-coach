appId: com.heymeld.app
name: "Dashboard — Pull to refresh does not crash"
---
- runFlow: ../helpers/auth_bypass.yaml

- tapOn:
    id: "tab-home"

# Scroll content down then pull to refresh (overscroll up)
- scroll
- swipe:
    direction: DOWN
    duration: 1000

# App should still be alive — verify tabs still present
- assertVisible:
    id: "tab-home"
- assertVisible:
    id: "tab-coach"
