appId: com.heymeld.app
name: "Tab Navigation: each tab loads correct screen"
---
- runFlow: ../helpers/auth_bypass.yaml

# Today (Home) tab is the default landing screen
- assertVisible:
    id: "tab-home"

# Trends tab
- tapOn:
    id: "tab-trends"
- assertVisible:
    id: "tab-trends"

# Coach tab (center)
- tapOn:
    id: "tab-coach"
- assertVisible:
    id: "coach-input"

# Log tab (renamed from Meals in PR #51)
- tapOn:
    id: "tab-log"
- assertVisible:
    id: "meals-fab"

# You tab (renamed from Profile in PR #51)
- tapOn:
    id: "tab-you"
- assertVisible:
    id: "profile-sign-out"
    optional: true

# Back to Today
- tapOn:
    id: "tab-home"
