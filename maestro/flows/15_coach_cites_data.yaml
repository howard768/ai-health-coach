appId: com.heymeld.app
name: "Coach — Chat loads and input works"
---
- runFlow: ../helpers/auth_bypass.yaml

- tapOn:
    id: "tab-coach"

# Verify the coach chat interface loaded with an input field
- assertVisible:
    id: "coach-input"

# Verify the coach title is visible
- assertVisible: "Coach"

# Screenshot for visual verification
- takeScreenshot: coach_chat_loaded
